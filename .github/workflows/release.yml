name: Release

on:
    pull_request:
        paths:
            - 'src/**'
            - 'scripts/**'
    push:
        branches: [main]
        tags: ["v*"]
        paths:
            - 'src/**'
            - 'scripts/**'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}
    cancel-in-progress: true

defaults:
    run:
        shell: bash

permissions:
    contents: read

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Check formatting
              run: cargo fmt --check

            - name: Run tests
              run: cargo test --locked

    build:
        name: Build ${{ matrix.platform }}
        needs: test
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: linux_amd64
                      runner: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      library: libduckdb_athena.so
                    - platform: linux_arm64
                      runner: ubuntu-latest
                      target: aarch64-unknown-linux-gnu
                      library: libduckdb_athena.so
                      linker: aarch64-linux-gnu-gcc
                    - platform: osx_arm64
                      runner: macos-14
                      target: aarch64-apple-darwin
                      library: libduckdb_athena.dylib

        steps:
            - uses: actions/checkout@v6

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install cross-compilation tools
              if: ${{ matrix.linker == 'aarch64-linux-gnu-gcc' }}
              run: |
                  sudo apt-get update -y -qq
                  sudo apt-get install -y -qq gcc-aarch64-linux-gnu

            - name: Build release extension
              env:
                  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
              run: cargo build --release --locked --target ${{ matrix.target }}

            - name: Package extension
              env:
                  DUCKDB_PLATFORM: ${{ matrix.platform }}
                  RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
              run: |
                  mkdir -p dist
                  if [[ -z "${RELEASE_VERSION}" ]]; then
                    RELEASE_VERSION="$(git rev-parse --short=12 HEAD)"
                  fi
                  cp "target/${{ matrix.target }}/release/${{ matrix.library }}" "dist/athena.duckdb_extension"
                  DUCKDB_EXTENSION_VERSION="${RELEASE_VERSION}" python scripts/append_extension_footer.py "dist/athena.duckdb_extension"
                  gzip -9 -c "dist/athena.duckdb_extension" > "dist/athena-${{ matrix.platform }}.duckdb_extension.gz"

            - name: Upload build artifact
              uses: actions/upload-artifact@v7
              with:
                  name: athena-${{ matrix.platform }}
                  path: dist/athena-${{ matrix.platform }}.duckdb_extension.gz
                  if-no-files-found: error

    github-release:
        name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v7
              with:
                  path: dist
                  merge-multiple: true

            - name: Create release and upload assets
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release create "${GITHUB_REF_NAME}" dist/*.duckdb_extension.gz \
                    --repo "${GITHUB_REPOSITORY}" \
                    --title "${GITHUB_REF_NAME}" \
                    --notes "Unsigned DuckDB Athena extension build for ${GITHUB_REF_NAME}."
